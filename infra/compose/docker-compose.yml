services:
  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_AUTH_USER_ID: ${VITE_AUTH_USER_ID:-}
        VITE_AUTH_USER_EMAIL: ${VITE_AUTH_USER_EMAIL:-}
        VITE_AUTH_USER_NAME: ${VITE_AUTH_USER_NAME:-}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - browserlab

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DOCKER_HOST: ${DOCKER_HOST:-tcp://dockerproxy:2375}
      AUTH_MODE: ${AUTH_MODE:-header}
      AUTOMATION_API_KEYS_JSON: ${AUTOMATION_API_KEYS_JSON:-{}}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://browserlab:browserlab@db:5432/browserlab
      SESSION_LAUNCH_MODE: docker
      WORKER_ALLOW_RUNTIME_IMAGE_RESOLUTION: ${WORKER_ALLOW_RUNTIME_IMAGE_RESOLUTION:-false}
      WORKER_VERIFY_IMAGES_ON_STARTUP: ${WORKER_VERIFY_IMAGES_ON_STARTUP:-true}
      WORKER_IMAGE: ${WORKER_IMAGE:-foss-browserlab-chromium-worker:latest}
      WORKER_BUILD_CONTEXT: /workspace
      WORKER_DOCKERFILE: images/chromium/Dockerfile
      FIREFOX_WORKER_IMAGE: ${FIREFOX_WORKER_IMAGE:-foss-browserlab-firefox-worker:latest}
      FIREFOX_WORKER_BUILD_CONTEXT: /workspace
      FIREFOX_WORKER_DOCKERFILE: images/firefox/Dockerfile
      BRAVE_WORKER_IMAGE: ${BRAVE_WORKER_IMAGE:-foss-browserlab-brave-worker:latest}
      BRAVE_WORKER_BUILD_CONTEXT: /workspace
      BRAVE_WORKER_DOCKERFILE: images/brave/Dockerfile
      EDGE_WORKER_IMAGE: ${EDGE_WORKER_IMAGE:-foss-browserlab-edge-worker:latest}
      EDGE_WORKER_BUILD_CONTEXT: /workspace
      EDGE_WORKER_DOCKERFILE: images/edge/Dockerfile
      VIVALDI_WORKER_IMAGE: ${VIVALDI_WORKER_IMAGE:-foss-browserlab-vivaldi-worker:latest}
      VIVALDI_WORKER_BUILD_CONTEXT: /workspace
      VIVALDI_WORKER_DOCKERFILE: images/vivaldi/Dockerfile
      UBUNTU_XFCE_WORKER_IMAGE: ${UBUNTU_XFCE_WORKER_IMAGE:-foss-browserlab-ubuntu-xfce-worker:latest}
      UBUNTU_XFCE_WORKER_BUILD_CONTEXT: /workspace
      UBUNTU_XFCE_WORKER_DOCKERFILE: images/ubuntu-xfce/Dockerfile
      KALI_XFCE_WORKER_IMAGE: ${KALI_XFCE_WORKER_IMAGE:-foss-browserlab-kali-xfce-worker:latest}
      KALI_XFCE_WORKER_BUILD_CONTEXT: /workspace
      KALI_XFCE_WORKER_DOCKERFILE: images/kali-xfce/Dockerfile
      WORKER_COMMAND: ""
      WORKER_NETWORK: browserlab
      WORKER_CPU_LIMIT: ${WORKER_CPU_LIMIT:-1.5}
      WORKER_MEMORY_LIMIT: ${WORKER_MEMORY_LIMIT:-2g}
      WORKER_PIDS_LIMIT: ${WORKER_PIDS_LIMIT:-256}
      WORKER_READ_ONLY_ROOTFS: ${WORKER_READ_ONLY_ROOTFS:-true}
      WORKER_TMPFS_SIZE_MB: ${WORKER_TMPFS_SIZE_MB:-512}
      WORKER_ALLOW_OUTBOUND_NETWORK: ${WORKER_ALLOW_OUTBOUND_NETWORK:-true}
      TURN_PUBLIC_HOST: ${TURN_PUBLIC_HOST:-localhost}
      TURN_INTERNAL_HOST: ${TURN_INTERNAL_HOST:-coturn}
      TURN_USERNAME: ${TURN_USERNAME:-browserlab}
      TURN_PASSWORD: ${TURN_PASSWORD:-change-me}
      TURN_TLS_ENABLED: ${TURN_TLS_ENABLED:-false}
      SWEEPER_INTERVAL_SECONDS: ${SWEEPER_INTERVAL_SECONDS:-30}
    volumes:
      - ../..:/workspace:ro
    depends_on:
      dockerproxy:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      coturn:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz')\" || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - browserlab

  dockerproxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      EXEC: 1
      INFO: 1
      POST: 1
      DELETE: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - browserlab

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - browserlab

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: browserlab
      POSTGRES_USER: browserlab
      POSTGRES_PASSWORD: browserlab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U browserlab -d browserlab"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - browserlab

  coturn:
    image: coturn/coturn:4.6.3
    entrypoint:
      - /bin/sh
      - -lc
      - |
        exec turnserver -c /etc/coturn/turnserver.conf -n \
          ${TURN_EXTERNAL_IP:+--external-ip "$TURN_EXTERNAL_IP"}
    environment:
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ../coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pidof turnserver >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - browserlab

volumes:
  pgdata:

networks:
  browserlab:
    driver: bridge
    name: browserlab
