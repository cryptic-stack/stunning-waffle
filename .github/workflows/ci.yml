name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint JS
        run: pnpm lint
      - name: Typecheck JS
        run: pnpm typecheck
      - name: Test JS
        run: pnpm test

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -c constraints.txt .[dev]
      - name: Lint API
        run: python -m ruff check .
      - name: Test API
        run: pytest

  session-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/session-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -c constraints.txt .[dev]
      - name: Test session agent
        run: pytest

  smoke:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - api
      - session-agent
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm --filter @foss-browserlab/frontend exec playwright install --with-deps chromium
      - name: Start stack
        run: AUTH_MODE=header VITE_AUTH_USER_ID=ci-viewer-user bash infra/scripts/dev-up.sh
      - name: Runtime smoke test
        run: bash infra/scripts/e2e-smoke.sh
      - name: Viewer E2E test
        run: PLAYWRIGHT_AUTH_USER_ID=ci-viewer-user pnpm --filter @foss-browserlab/frontend test:e2e
      - name: Stop stack
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml down --remove-orphans
